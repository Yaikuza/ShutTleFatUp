<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>🏸 จับคู่แบด</title>
<style>
:root {
  --primary: #6366f1;
  --primary-light: #818cf8;
  --primary-dark: #4f46e5;
  --success: #10b981;
  --success-light: #d1fae5;
  --warning: #f59e0b;
  --warning-light: #fef3c7;
  --danger: #ef4444;
  --bg: #f8fafc;
  --card: #ffffff;
  --text: #0f172a;
  --text2: #64748b;
  --border: #e2e8f0;
  --border-soft: #f1f5f9;
  --shadow: 0 2px 8px rgba(0,0,0,.06);
  --shadow-lg: 0 8px 30px rgba(0,0,0,.12);
  --radius: 14px;
  --radius-sm: 10px;
  --muted: #f8fafc;
  --chip-bg: #eef2ff;
  --line: #e2e8f0;
  --gradient: linear-gradient(135deg, #6366f1, #8b5cf6);
  --gradient-warm: linear-gradient(135deg, #f59e0b, #ef4444);
  --avatar-size: 36px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px;-webkit-text-size-adjust:100%}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
button{touch-action:manipulation;cursor:pointer;-webkit-tap-highlight-color:transparent}
input,button{font-size:inherit;font-family:inherit}

/* Header */
header{background:var(--gradient);color:#fff;padding:14px 16px;position:sticky;top:0;z-index:10;box-shadow:0 2px 12px rgba(99,102,241,.3)}
.header-top{display:flex;align-items:center;justify-content:space-between}
header h1{font-size:20px;font-weight:800;letter-spacing:-.3px}
.court-ctrl{display:flex;align-items:center;gap:8px}
.court-ctrl button{background:rgba(255,255,255,.2);border:none;color:#fff;width:36px;height:36px;border-radius:50%;font-size:20px;line-height:1;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
.court-ctrl button:active{background:rgba(255,255,255,.35)}
.court-ctrl span{font-weight:700;font-size:18px;min-width:20px;text-align:center}
.btn-icon{background:none;border:none;font-size:22px;padding:6px;border-radius:8px;line-height:1}
.btn-icon:active{background:rgba(0,0,0,.08)}

/* Queue */
.badge{background:var(--gradient);color:#fff;font-size:12px;padding:2px 10px;border-radius:10px;font-weight:600}
.badge-primary{background:var(--primary-light)}
.queue-players{display:flex;flex-wrap:wrap;gap:8px;min-height:36px;padding:4px 0}
.queue-chip{display:inline-flex;align-items:center;gap:6px;background:var(--chip-bg);color:var(--primary);padding:4px 10px;border-radius:18px;font-size:13px;font-weight:500;white-space:nowrap;cursor:grab;transition:box-shadow .2s,transform .2s;user-select:none}
.queue-chip:active{cursor:grabbing;box-shadow:var(--shadow-lg);transform:scale(1.05)}
.queue-chip.dragging{opacity:.5}
.queue-chip .remove{background:none;border:none;color:#94a3b8;font-size:16px;padding:0 2px;line-height:1;cursor:pointer}
.queue-chip .remove:active{color:var(--danger)}
.queue-empty{color:var(--text2);font-size:13px;padding:4px 0}
.queue-chip .avatar{width:var(--avatar-size);height:var(--avatar-size);border-radius:50%;display:inline-flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:14px;flex-shrink:0;margin:-4px 0 -4px -8px}
.queue-chip .avatar-small{width:24px;height:24px;font-size:11px;margin:-2px 2px -2px 0}

/* Courts */
.courts{padding:0 12px 12px;display:flex;flex-direction:column;gap:10px}
.court-card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;animation:slideUp .25s ease;border-left:4px solid var(--border)}
.court-card.status-playing{border-left-color:var(--warning)}
.court-card.status-waiting.queue-full{border-left-color:var(--success)}
.court-header{display:flex;align-items:center;justify-content:space-between;padding:10px 14px 8px}
.court-title{font-weight:700;font-size:16px;display:flex;align-items:center;gap:8px}
.court-body{padding:0 14px 14px}
.court-empty{text-align:center;padding:16px 0;color:var(--text2)}
.court-empty .big-btn{display:block;width:100%;max-width:260px;margin:10px auto 0;padding:14px;background:var(--gradient);color:#fff;border:none;border-radius:var(--radius-sm);font-size:16px;font-weight:600;box-shadow:0 2px 8px rgba(99,102,241,.25)}
.court-empty .big-btn:disabled{background:#94a3b8;opacity:.6;box-shadow:none}
.court-empty .big-btn:not(:disabled):active{opacity:.9}
.match-display{display:flex;align-items:center;justify-content:center;gap:6px;padding:8px 0}
.team-box{flex:1;max-width:40%;background:var(--muted);border-radius:var(--radius-sm);padding:14px 10px;text-align:center;cursor:pointer;border:2px solid transparent;transition:all .2s;user-select:none;-webkit-tap-highlight-color:transparent;position:relative}
.team-box.team-a{background:linear-gradient(135deg,#eef2ff,#e0e7ff);border-color:#c7d2fe}
.team-box.team-a:active{background:linear-gradient(135deg,#c7d2fe,#a5b4fc);border-color:var(--primary)}
.team-box.team-b{background:linear-gradient(135deg,#fdf2f8,#fce7f3);border-color:#fbcfe8}
.team-box.team-b:active{background:linear-gradient(135deg,#fbcfe8,#f9a8d4);border-color:#ec4899}
.team-box .names{font-weight:700;font-size:16px;line-height:1.4}
.team-box .tap-hint{font-size:10px;color:var(--text2);margin-top:4px;opacity:.7}
.team-box .consec{font-size:11px;color:var(--text2);margin-left:4px}
.vs-badge{background:var(--gradient);color:#fff;width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;box-shadow:0 2px 8px rgba(99,102,241,.3);flex-shrink:0;z-index:1}
.waiting-actions{display:flex;gap:8px;margin-top:8px}
.waiting-actions button{flex:1;padding:12px;border:none;border-radius:var(--radius-sm);font-weight:600;font-size:14px}
.waiting-actions .btn-primary{background:var(--gradient);color:#fff;box-shadow:0 2px 8px rgba(99,102,241,.25)}
.waiting-actions .btn-primary:disabled{background:#94a3b8;box-shadow:none}
.waiting-actions .btn-primary:not(:disabled):active{opacity:.9}
.waiting-actions .btn-outline{background:#fff;color:var(--text2);border:2px solid var(--border)}
.court-swap-row{margin-top:4px;text-align:center}
.court-swap-btn{background:none;border:none;color:var(--text2);font-size:12px;padding:6px}
.court-empty-msg{font-size:14px;margin-bottom:4px;font-weight:500}
.court-empty-sub{font-size:12px;color:var(--text2);margin-bottom:10px}
.court-waiting-msg{font-size:14px;margin-bottom:8px;font-weight:500}

/* Collapse sections */
.collapse-section{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;margin:0 12px 10px}
.collapse-section:first-child{margin-top:8px}
.collapse-header{padding:14px 16px;font-weight:600;font-size:15px;display:flex;align-items:center;justify-content:space-between;user-select:none;-webkit-tap-highlight-color:transparent;cursor:pointer}
.collapse-header:active{opacity:.8}
.collapse-header.head-players{background:linear-gradient(135deg,#e0e7ff,#c7d2fe);color:#3730a3;border-bottom:3px solid #6366f1}
.collapse-header.head-queue{background:linear-gradient(135deg,#fce7f3,#fbcfe8);color:#9d174d;border-bottom:3px solid #ec4899}
.collapse-header.head-stats{background:linear-gradient(135deg,#d1fae5,#a7f3d0);color:#065f46;border-bottom:3px solid #10b981}
.collapse-header.head-settings{background:linear-gradient(135deg,#fef3c7,#fde68a);color:#92400e;border-bottom:3px solid #f59e0b}
.collapse-icon{font-size:12px;transition:transform .2s;color:var(--text2)}
.collapse-icon.open{transform:rotate(90deg)}
.collapse-body{display:none;padding:0 16px 16px;border-top:1px solid var(--border)}
.collapse-body.open{display:block}

/* Players panel */
.section-title{font-size:16px;font-weight:700;margin:16px 0 8px;display:flex;align-items:center;justify-content:space-between}
.section-title:first-child{margin-top:0}
.input-row{display:flex;gap:8px;margin-bottom:8px}
.input-row input{flex:1;padding:10px 12px;border:2px solid var(--border);border-radius:var(--radius-sm);outline:none;font-size:15px}
.input-row input:focus{border-color:var(--primary)}
.input-row button{padding:10px 16px;background:var(--primary);color:#fff;border:none;border-radius:var(--radius-sm);font-weight:600;white-space:nowrap}
.input-row button:active{background:var(--primary-light)}
.player-item{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--border-soft)}
.player-item:last-child{border-bottom:none}
.player-item .name{flex:1;font-size:15px}
.player-item .game-count{font-size:12px;color:var(--text2);margin-left:4px}
.player-item .del-btn{background:none;border:none;color:#94a3b8;font-size:18px;padding:4px;line-height:1}
.player-item .del-btn:active{color:var(--danger)}
.pool-toggle{width:44px;height:28px;background:#cbd5e1;border-radius:14px;border:none;position:relative;transition:background .2s;flex-shrink:0}
.pool-toggle::after{content:'';position:absolute;top:3px;left:3px;width:22px;height:22px;background:#fff;border-radius:50%;transition:transform .2s}
.pool-toggle.active{background:var(--primary)}
.pool-toggle.active::after{transform:translateX(16px)}
.action-bar{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap}
.action-bar button{flex:1;min-width:120px;padding:12px;border:none;border-radius:var(--radius-sm);font-weight:600;font-size:14px}
.action-bar .btn-primary{background:var(--primary);color:#fff}
.action-bar .btn-primary:active{background:var(--primary-light)}
.action-bar .btn-danger{background:#fee2e2;color:var(--danger)}
.action-bar .btn-danger:active{background:#fecaca}

/* Queue inner panels */
.q-panel{background:var(--card);border-radius:8px;padding:8px 10px;margin-bottom:8px;width:100%}
.q-panel-title{font-size:13px;font-weight:600;margin-bottom:6px}
.q-table{width:100%;font-size:12px;border-collapse:collapse}
.q-table th{padding:3px 6px;text-align:left;font-weight:600;font-size:12px;color:var(--text2);border-bottom:1px solid var(--border)}
.q-table th.col-center{text-align:center}
.q-table td{padding:4px 6px;border-bottom:1px solid var(--line)}
.q-table td.col-center{text-align:center}
.q-table tr:last-child td{border-bottom:none}
.q-table .td-name{font-weight:600;text-align:center}
.q-table .win{color:var(--success);font-weight:600}
.q-table .lose{color:var(--danger);font-weight:600}
.q-table .win-pct{color:var(--text2);font-size:11px;margin-left:2px}
.q-table tr:nth-child(even) td{background:var(--muted)}
.stat-table tr:nth-child(even) td{background:var(--border-soft)}
.q-table .status-done{color:var(--danger)}
.q-table .status-ok{color:var(--success)}
.q-status-line{font-size:12px;margin-top:6px}
.q-status-line.ok{color:var(--success)}
.q-status-line.warn{color:var(--warning);padding:6px 0}
.q-next-btn{margin-top:6px;width:100%;padding:10px;border:none;border-radius:var(--radius-sm);font-weight:600;font-size:14px;background:var(--primary);color:#fff}
/* Stats panel */
.stats-nav{display:flex;gap:4px;margin-bottom:12px;background:var(--card);border-radius:var(--radius-sm);padding:4px;box-shadow:var(--shadow)}
.stats-nav button{flex:1;padding:8px;border:none;border-radius:6px;background:none;font-weight:500;font-size:13px;color:var(--text2)}
.stats-nav button.active{background:var(--primary);color:#fff}
.stat-table{width:100%;border-collapse:collapse;font-size:13px;background:var(--card);border-radius:var(--radius-sm);overflow:hidden;box-shadow:var(--shadow)}
.stat-table th{background:var(--muted);padding:8px 6px;text-align:left;font-weight:600;font-size:12px;color:var(--text2);border-bottom:2px solid var(--border)}
.stat-table td{padding:6px;border-bottom:1px solid var(--border-soft)}
.stat-table tr:last-child td{border-bottom:none}
.history-list{background:var(--card);border-radius:var(--radius-sm);box-shadow:var(--shadow);padding:8px 12px}
.history-item{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--border-soft);font-size:13px}
.history-item:last-child{border-bottom:none}
.history-item .time{color:var(--text2);font-size:12px;min-width:44px}
.history-item .court-label{font-weight:600;min-width:52px}
.history-item .teams{flex:1}
.history-item .trophy{font-size:14px}

/* Settings */
.setting-row{display:flex;align-items:center;justify-content:space-between;padding:14px 0;border-bottom:1px solid var(--border-soft)}
.setting-row:last-child{border-bottom:none}
.setting-label{font-size:15px}
.setting-desc{font-size:12px;color:var(--text2);margin-top:2px}
select.setting-input{padding:6px 12px;border:2px solid var(--border);border-radius:var(--radius-sm);font-size:14px;background:#fff}
.toggle-switch{width:48px;height:28px;background:#cbd5e1;border-radius:14px;border:none;position:relative;flex-shrink:0}
.toggle-switch::after{content:'';position:absolute;top:3px;left:3px;width:22px;height:22px;background:#fff;border-radius:50%;transition:transform .2s}
.toggle-switch.active{background:var(--primary)}
.toggle-switch.active::after{transform:translateX(20px)}
.danger-btn{width:100%;padding:14px;border:none;border-radius:var(--radius-sm);font-weight:600;font-size:15px;margin-top:8px}
.danger-btn.danger{background:#fee2e2;color:var(--danger)}
.danger-btn.danger:active{background:#fecaca}
.danger-btn.outline{background:none;color:var(--primary);border:2px solid var(--primary)}
.settings-card{background:var(--card);border-radius:var(--radius-sm);box-shadow:var(--shadow);padding:4px 16px 12px}
.settings-card + .settings-card{margin-top:16px}
.settings-info{font-size:14px;color:var(--text2);margin-bottom:8px}

/* Toast */
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#1e293b;color:#fff;padding:10px 20px;border-radius:8px;font-size:14px;z-index:40;opacity:0;transition:opacity .3s;pointer-events:none}
.toast.show{opacity:1}

/* Empty state */
.empty-state{text-align:center;padding:40px 20px;color:var(--text2)}
.empty-state .icon{font-size:48px;margin-bottom:12px}
.empty-state p{font-size:15px;margin-bottom:4px}
.empty-state .sub{font-size:13px}

/* Animation */
@keyframes slideUp{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}

/* Scrollbar */
.queue-players::-webkit-scrollbar{height:4px}
.queue-players::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:2px}

/* Bottom sheet */
.sheet-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:100;opacity:0;pointer-events:none;transition:opacity .3s}
.sheet-overlay.open{opacity:1;pointer-events:auto}
.sheet{position:fixed;bottom:0;left:0;right:0;background:var(--card);border-radius:var(--radius) var(--radius) 0 0;z-index:101;transform:translateY(100%);transition:transform .35s cubic-bezier(.32,.72,0,1);max-height:85vh;overflow-y:auto;box-shadow:var(--shadow-lg)}
.sheet.open{transform:translateY(0)}
.sheet-handle{width:40px;height:4px;background:var(--border);border-radius:2px;margin:10px auto}
.sheet-header{padding:0 20px 12px;display:flex;align-items:center;justify-content:space-between;font-weight:700;font-size:17px}
.sheet-close{background:none;border:none;font-size:20px;color:var(--text2);padding:4px}
.sheet-body{padding:0 20px 20px}

/* Toast */
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:var(--text);color:#fff;padding:10px 20px;border-radius:var(--radius-sm);font-size:14px;font-weight:500;z-index:200;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap;box-shadow:var(--shadow-lg)}
.toast.show{opacity:1}
</style>
</head>
<body>

<header>
  <div class="header-top">
    <h1>🏸 สนาม</h1>
    <div class="court-ctrl">
      <button onclick="removeCourt()" title="ลดสนาม">−</button>
       <span id="courtCount">2</span>
      <button onclick="addCourt()" title="เพิ่มสนาม">+</button>
    </div>
  </div>
</header>

<main id="mainView">
  <div class="collapse-section">
    <div class="collapse-header head-players" onclick="toggleCollapse('Players')">
      <span>👤 ผู้เล่น</span>
      <span class="collapse-icon">▶</span>
    </div>
    <div id="collapsePlayers" class="collapse-body"></div>
  </div>

  <div class="collapse-section">
    <div class="collapse-header head-queue" onclick="toggleCollapse('Queue')">
      <span>👥 ตาราง</span>
      <span style="display:flex;align-items:center;gap:6px;font-size:13px">
        <span class="badge badge-primary">รอบ <span id="roundNumber">1</span></span>
        <span id="queueCount" class="badge">0</span>
        <button onclick="event.stopPropagation();shuffleQueue()" class="btn-icon" title="สับคิว">🔀</button>
        <button onclick="event.stopPropagation();resetSession()" class="btn-icon" title="รีเซตรอบ (เก็บชื่อ+สถิติ)">♻️</button>
      </span>
      <span class="collapse-icon open">▶</span>
    </div>
    <div id="collapseQueue" class="collapse-body open">
      <div id="queuePlayers" class="queue-players"></div>
    </div>
  </div>

  <div id="courtsContainer" class="courts"></div>

  <div style="display:flex;gap:10px;margin:0 12px 10px">
    <button onclick="openSheet('Stats')" style="flex:1;padding:12px;background:linear-gradient(135deg,#ecfdf5,#d1fae5);border:none;border-radius:var(--radius-sm);font-weight:600;font-size:14px;color:#065f46;display:flex;align-items:center;justify-content:center;gap:6px">📊 สถิติ</button>
    <button onclick="openSheet('Settings')" style="flex:1;padding:12px;background:linear-gradient(135deg,#fffbeb,#fef3c7);border:none;border-radius:var(--radius-sm);font-weight:600;font-size:14px;color:#92400e;display:flex;align-items:center;justify-content:center;gap:6px">⚙️ ตั้งค่า</button>
  </div>
</main>

<div class="sheet-overlay" id="sheetOverlay" onclick="closeSheet()"></div>
<div class="sheet" id="sheet">
  <div class="sheet-handle"></div>
  <div class="sheet-header">
    <span id="sheetTitle">Title</span>
    <button class="sheet-close" onclick="closeSheet()">✕</button>
  </div>
  <div class="sheet-body" id="sheetBody"></div>
</div>
<div class="toast" id="toast"></div>

<script>
'use strict';

// ===== STORAGE =====
const SK = 'bdm_rotation';
const DEFAULT_COURTS = 2;
const MAX_COURTS = 6;
const MIN_COURTS = 1;

function freshCourt(id) {
  return { id, status: 'waiting', teamA: [], teamB: [], games: 0, consecutive: {}, startedRound: 1 };
}

function getDef() {
  const courts = [];
  for (let i = 1; i <= DEFAULT_COURTS; i++) courts.push(freshCourt(i));
  return {
    mainPlayers: [],
    pool: {},
    queue: [],
    courts,
    nextCourtId: DEFAULT_COURTS + 1,
    history: [],
    pairCount: {},
    oppCount: {},
    gameCount: {},
    roundPairs: {},
    roundSchedule: [],
    currentRound: 1,
    settings: { gamesPerMatch: 2 }
  };
}

function migrate(d) {
  if (!d.courts || !d.courts.length) {
    d.courts = [];
    for (let i = 1; i <= DEFAULT_COURTS; i++) d.courts.push(freshCourt(i));
    d.nextCourtId = DEFAULT_COURTS + 1;
  } else {
    for (const c of d.courts) {
      if (c.games === undefined) c.games = 0;
      if (!c.consecutive) c.consecutive = {};
      if (c.startedRound === undefined) c.startedRound = d.currentRound || 1;
    }
    d.nextCourtId = d.courts.length + 1;
  }
  d.settings = d.settings || { gamesPerMatch: 2 };
  if (!d.settings.gamesPerMatch) d.settings.gamesPerMatch = 2;
  d.roundPairs = d.roundPairs || {};
  d.roundSchedule = d.roundSchedule || [];
  d.currentRound = d.currentRound || 1;
  if (Array.isArray(d.history)) {
    for (const r of d.history) if (r.round === undefined) r.round = 1;
  }
  return d;
}

function loadData() {
  try {
    const raw = localStorage.getItem(SK);
    if (raw) return migrate(JSON.parse(raw));
  } catch (e) {}
  return getDef();
}

function saveData() { localStorage.setItem(SK, JSON.stringify(data)); }

let data = loadData();

// ===== UTILITY =====
function key(a, b) {
  return a < b ? a + '_' + b : b + '_' + a;
}

function escHtml(s) {
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

function jsStr(s) {
  return String(s).replace(/\\/g, '\\\\').replace(/'/g, "\\'");
}

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.classList.remove('show'), 2200);
}

function persist() {
  saveData();
  render();
  syncQueueCount();
}

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

// ===== QUEUE =====
function syncQueueCount() {
  const el = document.getElementById('queueCount');
  if (el) el.textContent = data.queue.length;
}

function ejectFromCourts(name) {
  // If a player is in a playing court, the court may break
  for (const c of data.courts) {
    if (c.status !== 'playing') continue;
    const inA = c.teamA.includes(name);
    const inB = c.teamB.includes(name);
    if (!inA && !inB) continue;
    c.teamA = c.teamA.filter(p => p !== name);
    c.teamB = c.teamB.filter(p => p !== name);
    if (c.teamA.length < 2 || c.teamB.length < 2) {
      for (const p of [...c.teamA, ...c.teamB])
        if (!data.queue.includes(p)) data.queue.push(p);
      c.teamA = []; c.teamB = [];
      c.status = 'waiting'; c.games = 0; c.consecutive = {};
    }
  }
}

function removeFromQueue(name) {
  data.queue = data.queue.filter(p => p !== name);
  ejectFromCourts(name);
  persist();
}

function shuffleQueue() {
  if (data.queue.length < 2) { toast('คิวมีคนน้อยเกินไป'); return; }
  data.queue = shuffle(data.queue.slice());
  snapshotSchedule();
  persist();
  toast('🔀 สับคิว — ' + data.roundSchedule.length + ' คู่');
}

function startNewRound() {
  const courtPlayers = [];
  for (const c of data.courts) {
    if (c.status === 'playing') {
      courtPlayers.push(...c.teamA, ...c.teamB);
    }
  }
  const allPlayers = [...new Set([...data.queue, ...courtPlayers])];
  const shuffled = shuffle(allPlayers);
  data.roundPairs = {};
  data.currentRound++;
  for (const c of data.courts) c.startedRound = data.currentRound;
  data.roundSchedule = buildScheduleFromQueue(shuffled);
  data.queue = shuffle(data.queue.slice()).filter(p => !isInAnyCourt(p));
  persist();
  for (const c of data.courts)
    if (c.status === 'waiting' && data.queue.length >= 4) fillCourt(c.id);
  toast('🔄 รอบที่ ' + data.currentRound + ' — เริ่มใหม่');
}

// ===== COURTS =====
function renumberCourts() {
  data.courts.forEach((c, i) => c.id = i + 1);
  data.nextCourtId = data.courts.length + 1;
}

function addCourt() {
  if (data.courts.length >= MAX_COURTS) { toast('สูงสุด ' + MAX_COURTS + ' สนาม'); return; }
  data.courts.push(freshCourt(data.nextCourtId++));
  renumberCourts();
  saveData();
  renderCourtCount();
  render();
  syncQueueCount();
}

function removeCourt() {
  if (data.courts.length <= MIN_COURTS) { toast('ต้องมีอย่างน้อย ' + MIN_COURTS + ' สนาม'); return; }
  const c = data.courts.pop();
  if (c.status === 'playing')
    for (const p of [...c.teamA, ...c.teamB])
      if (!data.queue.includes(p)) data.queue.push(p);
  renumberCourts();
  saveData();
  renderCourtCount();
  render();
  syncQueueCount();
}

function renderCourtCount() {
  document.getElementById('courtCount').textContent = data.courts.length;
}

function canPair(p1, p2) {
  return (data.roundPairs[key(p1, p2)] || 0) < (data.settings.gamesPerMatch || 2);
}

function findScheduledMatch() {
  // Find 2 pairs from roundSchedule where all 4 players are in queue
  // and neither pair has hit the games limit.
  // Pairs with earliest queue position (FIFO) get priority.
  const schedule = data.roundSchedule;
  if (!schedule || schedule.length < 2) return null;
  const qSet = new Set(data.queue);
  const limit = data.settings.gamesPerMatch || 2;
  const eligible = schedule
    .filter(p => {
      if (p.p2 === null) return false;
      const played = data.roundPairs[key(p.p1, p.p2)] || 0;
      return played < limit && qSet.has(p.p1) && qSet.has(p.p2);
    })
    .sort((a, b) => {
      const aIdx = Math.min(data.queue.indexOf(a.p1), data.queue.indexOf(a.p2));
      const bIdx = Math.min(data.queue.indexOf(b.p1), data.queue.indexOf(b.p2));
      return aIdx - bIdx;
    });
  for (let i = 0; i < eligible.length - 1; i++) {
    for (let j = i + 1; j < eligible.length; j++) {
      const a = eligible[i], b = eligible[j];
      const players = new Set([a.p1, a.p2, b.p1, b.p2]);
      if (players.size === 4) return [[a.p1, a.p2], [b.p1, b.p2]];
    }
  }
  return null;
}

function scheduleHasPlayableMatch() {
  // True if any 2-pair match from roundSchedule has all 4 players in queue
  // and neither pair has hit the games limit.
  const schedule = data.roundSchedule;
  if (!schedule || schedule.length < 2) return false;
  const qSet = new Set(data.queue);
  const limit = data.settings.gamesPerMatch || 2;
  for (let i = 0; i < schedule.length - 1; i++) {
    for (let j = i + 1; j < schedule.length; j++) {
      const a = schedule[i], b = schedule[j];
      if (a.p2 === null || b.p2 === null) continue;
      const players = new Set([a.p1, a.p2, b.p1, b.p2]);
      if (players.size !== 4) continue;
      const aOk = qSet.has(a.p1) && qSet.has(a.p2) && (data.roundPairs[key(a.p1, a.p2)] || 0) < limit;
      const bOk = qSet.has(b.p1) && qSet.has(b.p2) && (data.roundPairs[key(b.p1, b.p2)] || 0) < limit;
      if (aOk && bOk) return true;
    }
  }
  return false;
}

function isAnyCourtPlaying() {
  return data.courts.some(c => c.status === 'playing');
}

function promptNewRoundIfExhausted() {
  if (scheduleHasPlayableMatch()) return false;
  if (isAnyCourtPlaying()) return false;
  setTimeout(() => {
    if (confirm('🔄 ทุกคู่ใน schedule เล่นครบแล้ว\nเริ่มรอบใหม่?')) {
      startNewRound();
    }
  }, 200);
  return true;
}

function findScheduledOpponents(winTeam, exclude) {
  // Find a pair from roundSchedule that doesn't overlap with winTeam,
  // has both players in queue, hasn't hit the games limit,
  // and is not the exclude pair (the team that just played).
  // Prefers the pair with earliest queue position (FIFO).
  const limit = data.settings.gamesPerMatch || 2;
  const qSet = new Set(data.queue);
  const excludeKey = exclude ? key(exclude[0], exclude[1]) : null;
  let best = null;
  let bestIdx = Infinity;
  for (const p of data.roundSchedule) {
    if (p.p2 === null) continue;
    if (p.p1 === winTeam[0] || p.p1 === winTeam[1]) continue;
    if (p.p2 === winTeam[0] || p.p2 === winTeam[1]) continue;
    if (excludeKey && key(p.p1, p.p2) === excludeKey) continue;
    if (!qSet.has(p.p1) || !qSet.has(p.p2)) continue;
    if ((data.roundPairs[key(p.p1, p.p2)] || 0) >= limit) continue;
    const idx = Math.min(data.queue.indexOf(p.p1), data.queue.indexOf(p.p2));
    if (idx < bestIdx) { bestIdx = idx; best = [p.p1, p.p2]; }
  }
  return best;
}

function fillCourt(courtId) {
  const court = data.courts.find(c => c.id === courtId);
  if (!court) return;
  if (court.status === 'playing') { toast('สนามนี้กำลังเล่นอยู่'); return; }
  if (data.queue.length < 4) { toast('คิวต้องมีอย่างน้อย 4 คน'); return; }
  if (!scheduleHasPlayableMatch()) {
    toast('🔄 Schedule หมดแล้ว — เริ่มรอบใหม่');
    promptNewRoundIfExhausted();
    return;
  }

  const teams = findScheduledMatch();
  if (!teams) {
    toast('ไม่พบคู่ที่จัดได้');
    return;
  }
  court.teamA = teams[0];
  court.teamB = teams[1];
  data.queue = data.queue.filter(p => !teams[0].includes(p) && !teams[1].includes(p));
  court.status = 'playing';
  court.games = 0;
  court.consecutive = {};
  court.startedRound = data.currentRound;
  persist();
}

function recordStats(court) {
  // Pair counts: A & B
  for (let i = 0; i < court.teamA.length; i++) {
    for (let j = i + 1; j < court.teamA.length; j++) {
      const k = key(court.teamA[i], court.teamA[j]);
      data.pairCount[k] = (data.pairCount[k] || 0) + 1;
    }
    for (let j = 0; j < court.teamB.length; j++) {
      const k = key(court.teamA[i], court.teamB[j]);
      data.oppCount[k] = (data.oppCount[k] || 0) + 1;
    }
    data.gameCount[court.teamA[i]] = (data.gameCount[court.teamA[i]] || 0) + 1;
  }
  for (let i = 0; i < court.teamB.length; i++) {
    for (let j = i + 1; j < court.teamB.length; j++) {
      const k = key(court.teamB[i], court.teamB[j]);
      data.pairCount[k] = (data.pairCount[k] || 0) + 1;
    }
    data.gameCount[court.teamB[i]] = (data.gameCount[court.teamB[i]] || 0) + 1;
  }
}

function declareWinner(courtId, winner) {
  const court = data.courts.find(c => c.id === courtId);
  if (!court || court.status !== 'playing') return;
  if (!court.consecutive) court.consecutive = {};

  data.history.push({
    time: new Date().toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit' }),
    court: courtId,
    round: data.currentRound,
    teamA: [...court.teamA],
    teamB: [...court.teamB],
    winner
  });

  recordStats(court);
  court.games++;

  for (const p of [...court.teamA, ...court.teamB])
    court.consecutive[p] = (court.consecutive[p] || 0) + 1;

  // Per-round pair tracking — only if the game started in the current round
  if (court.startedRound === data.currentRound) {
    const kA = key(court.teamA[0], court.teamA[1]);
    const kB = key(court.teamB[0], court.teamB[1]);
    data.roundPairs[kA] = (data.roundPairs[kA] || 0) + 1;
    data.roundPairs[kB] = (data.roundPairs[kB] || 0) + 1;
  }

  const winTeam = winner === 'A' ? court.teamA : court.teamB;
  const loseTeam = winner === 'A' ? court.teamB : court.teamA;
  const limit = data.settings.gamesPerMatch || 2;

  // Each pair independently: if at limit → exit (queue), if not → stay
  const winAtLimit = (data.roundPairs[key(winTeam[0], winTeam[1])] || 0) >= limit;
  const loseAtLimit = (data.roundPairs[key(loseTeam[0], loseTeam[1])] || 0) >= limit;

  if (winAtLimit)
    for (const p of winTeam) if (!data.queue.includes(p)) data.queue.push(p);
  if (loseAtLimit)
    for (const p of loseTeam) if (!data.queue.includes(p)) data.queue.push(p);

  // Both at limit → court vacant
  if (winAtLimit && loseAtLimit) {
    court.teamA = []; court.teamB = []; court.status = 'waiting'; court.consecutive = {};
    saveData(); render(); syncQueueCount();
    promptNewRoundIfExhausted();
    return;
  }

  // Winners at limit, losers not → losers stay as the next team, find opponents
  if (winAtLimit) {
    court.teamA = [...loseTeam]; court.teamB = []; court.status = 'waiting'; court.consecutive = {};
    const next = findScheduledOpponents(loseTeam, null);
    if (next) {
      court.teamB = next;
      court.status = 'playing';
      court.startedRound = data.currentRound;
      data.queue = data.queue.filter(p => !next.includes(p));
      toast('⏳ ' + loseTeam.join('+') + ' vs ' + next.join('+'));
    } else {
      toast('⏳ ' + loseTeam.join('+') + ' รอคู่ใหม่');
    }
    persist();
    return;
  }

  // Winners not at limit → normal winner-stays
  // Losers exit (whether at limit or not — at-limit already pushed above)
  if (!loseAtLimit)
    for (const p of loseTeam) if (!data.queue.includes(p)) data.queue.push(p);

  const scheduled = findScheduledOpponents(winTeam, loseTeam);
  let newP;
  if (scheduled) {
    newP = scheduled;
  } else {
    if (promptNewRoundIfExhausted()) {
      for (const p of winTeam) if (!data.queue.includes(p)) data.queue.push(p);
      court.teamA = []; court.teamB = []; court.status = 'waiting'; court.consecutive = {};
      persist();
      return;
    }
    const avail = data.queue.filter(p => !winTeam.includes(p));
    if (avail.length < 2) {
      court.teamA = [...winTeam]; court.teamB = []; court.status = 'waiting';
      toast('รอผู้เล่นเพิ่มเติม');
      persist();
      return;
    }
    newP = [avail[0], avail[1]];
  }
  court.teamA = winTeam;
  court.teamB = newP;
  court.startedRound = data.currentRound;
  data.queue = data.queue.filter(p => !newP.includes(p));
  toast('⏳ ' + winTeam.join('+') + ' vs ' + newP.join('+'));
  persist();
}

function swapBoth(courtId) {
  const court = data.courts.find(c => c.id === courtId);
  if (!court || court.status !== 'playing') return;
  for (const p of [...court.teamA, ...court.teamB])
    if (!data.queue.includes(p)) data.queue.push(p);
  court.teamA = []; court.teamB = []; court.status = 'waiting'; court.consecutive = {};
  court.startedRound = data.currentRound;
  saveData();
  fillCourt(courtId);
  syncQueueCount();
}

  if (!name) return;
  if (data.mainPlayers.includes(name)) { toast('มีชื่อนี้อยู่แล้ว'); return; }

  renderPlayers();
  syncQueueCount();

  input.selectionStart = input.selectionEnd = input.value.length;

function removePlayer(name) {
  if (!confirm('ลบ "' + name + '"?')) return;
  data.mainPlayers = data.mainPlayers.filter(p => p !== name);
  delete data.pool[name];
  data.queue = data.queue.filter(p => p !== name);
  ejectFromCourts(name);
  data.roundSchedule = data.roundSchedule.filter(p => p.p1 !== name && p.p2 !== name);
  saveData();
  render();
  renderPlayers();
  syncQueueCount();
}

function togglePool(name) {
  data.pool[name] = !data.pool[name];
  if (data.pool[name]) {
    if (!data.queue.includes(name) && !isInAnyCourt(name)) data.queue.push(name);
  } else {
    data.queue = data.queue.filter(p => p !== name);
    ejectFromCourts(name);
    data.roundSchedule = data.roundSchedule.filter(p => p.p1 !== name && p.p2 !== name);
  }
  saveData();
  render();
  renderPlayers();
  syncQueueCount();
}

function isInAnyCourt(name) {
  for (const c of data.courts)
    if (c.teamA.includes(name) || c.teamB.includes(name)) return true;
  return false;
}

function addPoolToQueue() {
  let added = 0;
  for (const p of data.mainPlayers)
    if (data.pool[p] && !data.queue.includes(p)) { data.queue.push(p); added++; }
  if (added === 0) { toast('ไม่มีคนเพิ่ม'); return; }
  data.queue = shuffle(data.queue);
  persist();
  toast('เพิ่ม ' + added + ' คน');
}

function clearQueue() {
  data.queue = [];
  saveData();
  render();
  syncQueueCount();
}

function resetSession() {
  if (!confirm('รีเซตรอบเล่น?\n\n• ล้างคิว + สนาม + ประวัติ\n• ผู้เล่นที่เช็คชื่อ (pool on) กลับเข้าสู่ระบบ\n• เริ่มรอบใหม่\n\nชื่อผู้เล่นและสถิติรวมยังอยู่ครบ')) return;

  data.queue = [];
  data.courts = data.courts.map(c => freshCourt(c.id));

  saveData();
  render();

  syncQueueCount();
  toast('🔄 รีเซตรอบเรียบร้อย');
}

// ===== STATS COMPUTATION =====
function getRoundPairScores() {
  // For each unique pair in this round, count W:L from data.history
  const scores = {};
  for (const r of data.history) {
    if (r.round !== data.currentRound) continue;
    const winSide = r.winner === 'A' ? r.teamA : r.teamB;
    const loseSide = r.winner === 'A' ? r.teamB : r.teamA;
    if (winSide.length === 2) {
      const k = key(winSide[0], winSide[1]);
      if (!scores[k]) scores[k] = { wins: 0, losses: 0, done: false };
      scores[k].wins++;
    }
    if (loseSide.length === 2) {
      const k = key(loseSide[0], loseSide[1]);
      if (!scores[k]) scores[k] = { wins: 0, losses: 0, done: false };
      scores[k].losses++;
    }
  }
  return Object.entries(scores)
    .map(([k, v]) => {
      const [p1, p2] = k.split('_');
      const games = v.wins + v.losses;
      const limit = data.settings.gamesPerMatch || 2;
      return { p1, p2, wins: v.wins, losses: v.losses, games, done: games >= limit };
    })
    .sort((a, b) => b.games - a.games || b.wins - a.wins);
}

function buildScheduleFromQueue(players) {
  // Generate a perfect matching from current queue: one disjoint pair set per shuffle.
  // Each player appears in exactly one pair. If odd count, last player sits out.
  const q = players || data.queue;
  if (q.length < 2) return [];
  const schedule = [];
  for (let i = 0; i + 1 < q.length; i += 2) {
    schedule.push({ p1: q[i], p2: q[i + 1] });
  }
  return schedule;
}

function snapshotSchedule(players) {
  data.roundSchedule = buildScheduleFromQueue(players);
}

function getMatchSchedule() {
  // Use the snapshotted roundSchedule (stable across court fills).
  // Merge with played scores from data.history for live W:L display.
  if (!data.roundSchedule || !data.roundSchedule.length) return [];
  const played = {};
  for (const s of getRoundPairScores()) played[key(s.p1, s.p2)] = s;
  return data.roundSchedule
    .filter(p => p.p2 !== null)
    .map(p => {
      const s = played[key(p.p1, p.p2)];
      return {
        p1: p.p1, p2: p.p2,
        wins: s ? s.wins : 0,
        losses: s ? s.losses : 0,
        games: s ? s.games : 0
      };
    });
}

// ===== DRAG-TO-REORDER QUEUE =====
let dragIdx = -1;

function dragStart(e, idx) {
  dragIdx = idx;
  e.dataTransfer.effectAllowed = 'move';
  e.target.classList.add('dragging');
}

function dragOver(e) {
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
}

function dragDrop(e, toIdx) {
  e.preventDefault();
  document.querySelectorAll('.queue-chip.dragging').forEach(el => el.classList.remove('dragging'));
  if (dragIdx < 0 || dragIdx === toIdx) { dragIdx = -1; return; }
  const item = data.queue.splice(dragIdx, 1)[0];
  data.queue.splice(toIdx, 0, item);
  dragIdx = -1;
  persist();
}

  renderCourts();
  renderQueue();
  renderCourtCount();
  renderRoundNumber();
}

const AVATAR_COLORS = ['#6366f1','#8b5cf6','#ec4899','#f43f5e','#f97316','#f59e0b','#10b981','#06b6d4','#3b82f6','#84cc16'];

function avatarColor(name) {
  let h = 0;
  for (let i = 0; i < name.length; i++) h = ((h << 5) - h) + name.charCodeAt(i);
  return AVATAR_COLORS[Math.abs(h) % AVATAR_COLORS.length];
}

function avatarHtml(name, small) {
  const c = avatarColor(name);
  const init = name.charAt(0).toUpperCase();
  const cls = small ? 'avatar avatar-small' : 'avatar';
  return `<span class="${cls}" style="background:${c}">${init}</span>`;
}

function renderQueueChips() {
  return '<div style="width:100%;margin-bottom:6px;display:flex;flex-wrap:wrap;gap:6px">' +
    data.queue.map((p, i) =>
      '<span class="queue-chip" draggable="true" ondragstart="dragStart(event,' + i + ')" ondrop="dragDrop(event,' + i + ')" ondragover="dragOver(event)" data-idx="' + i + '">' +
      avatarHtml(p) + escHtml(p) +
      '<button class="remove" onclick="event.stopPropagation();removeFromQueue(\'' + jsStr(p) + '\')">✕</button></span>'
    ).join('') +
    '</div>';
}

function renderQueueStatus() {
  if (!scheduleHasPlayableMatch() && data.roundSchedule.length >= 2) {
    return '<div style="width:100%"><div class="q-status-line warn">🔄 Schedule หมดแล้ว</div>' +
      '<button class="q-next-btn" onclick="startNewRound()">🔄 เริ่มรอบใหม่ (รอบที่ ' + (data.currentRound + 1) + ')</button></div>';
  }
  return '';
}

function renderPairScoreTable() {
  const schedule = getMatchSchedule();
  if (!schedule.length) return '';

  const rows = schedule.map(p => {
    const played = p.games > 0;
    return '<tr>' +
      '<td class="td-name">' + escHtml(p.p1) + '+' + escHtml(p.p2) + '</td>' +
      '<td class="col-center ' + (played ? '' : 'q-pending') + '">' + p.wins + ':' + p.losses + '</td>' +
      '</tr>';
  }).join('');

  const sitOut = data.roundSchedule && data.roundSchedule.some(p => p.p2 === null) ? ' · 1 คนพัก' : '';
  return '<div class="q-panel">' +
    '<div class="q-panel-title">🤝 คู่ (รอบ ' + data.currentRound + sitOut + ')</div>' +
    '<table class="q-table"><thead><tr>' +
    '<th class="col-center">ทีม</th><th class="col-center">Score</th>' +
    '</tr></thead><tbody>' + rows + '</tbody></table>' +
    '</div>';
}

function renderQueue() {
  const el = document.getElementById('queuePlayers');
  if (!el) return;
  if (data.queue.length === 0) {
    el.innerHTML = '<div class="queue-empty">คิวว่าง — เพิ่มผู้เล่นจาก 👤</div>';
    syncQueueCount();
    return;
  }

  el.innerHTML =
    renderQueueChips() +
    renderQueueStatus() +
    renderPairScoreTable();

  syncQueueCount();
}

function showTeam(court, team) {
  const limit = data.settings.gamesPerMatch || 2;
  return team.map(p => {
    const n = (court.consecutive || {})[p];
    return avatarHtml(p, true) + escHtml(p) +
      (n !== undefined ? '<span class="consec">(' + n + '/' + limit + ')</span>' : '');
  }).join('<span style="color:var(--text2);margin:0 4px">+</span>');
}

function renderCourtBody(c) {
  const isPlaying = c.status === 'playing' && c.teamA.length === 2 && c.teamB.length === 2;
  if (isPlaying) {
    const teamAStr = c.teamA.map(p => avatarHtml(p, true) + escHtml(p)).join('<span style="color:var(--text2);margin:0 4px">+</span>');
    const teamBStr = c.teamB.map(p => avatarHtml(p, true) + escHtml(p)).join('<span style="color:var(--text2);margin:0 4px">+</span>');
    return `
      <div class="match-display">
        <div class="team-box team-a" onclick="declareWinner(${c.id},'A')">
          <div class="names">${teamAStr}</div>
          <div class="tap-hint">👆 ชนะ</div>
        </div>
        <div class="vs-badge">VS</div>
        <div class="team-box team-b" onclick="declareWinner(${c.id},'B')">
          <div class="names">${teamBStr}</div>
          <div class="tap-hint">👆 ชนะ</div>
        </div>
      </div>
      <div class="court-swap-row">
        <button class="court-swap-btn" onclick="swapBoth(${c.id})">🔄 เปลี่ยนคู่</button>
      </div>`;
  }
  const hasTeamA = c.teamA.length > 0;
  const empty = hasTeamA
    ? `<div class="court-waiting-msg">⏳ รอคู่: ${escHtml(c.teamA.join(' + '))}</div>`
    : `<div class="court-empty-msg">🏟️ สนามว่าง</div>
       <div class="court-empty-sub">👥 คิว ${data.queue.length} คน</div>`;
  const disabled = data.queue.length < 4 || !scheduleHasPlayableMatch();
  return `<div class="court-empty">${empty}
    <button class="big-btn" onclick="fillCourt(${c.id})" ${disabled ? 'disabled' : ''}>👥 จัดผู้เล่น</button>
  </div>`;
}

function renderCourts() {
  const el = document.getElementById('courtsContainer');
  if (!el) return;
  el.innerHTML = data.courts.map(c => {
    let cls = 'court-card';
    if (c.status === 'playing') cls += ' status-playing';
    else if (data.queue.length >= 4 && scheduleHasPlayableMatch()) cls += ' status-waiting queue-full';
    return `<div class="${cls}">
      <div class="court-header">
        <span class="court-title">🏟️ สนาม ${c.id}</span>
      </div>
      <div class="court-body">${renderCourtBody(c)}</div>
    </div>`;
  }).join('');
  syncQueueCount();
}

// ===== PLAYERS TAB =====
function renderPlayers() {
  const el = document.getElementById('collapsePlayers');
  if (!el) return;
  let h = '<div class="input-row">' +
    '<input type="text" id="newPlayerInput" placeholder="ชื่อ..." onkeydown="if(event.key===\'Enter\')addMainPlayer()">' +
    '<button onclick="addMainPlayer()">เพิ่ม</button></div>';
  h += '<div class="section-title">ผู้เล่นหลัก <span style="font-size:13px;font-weight:400;color:var(--text2)">(' + data.mainPlayers.length + ')</span></div>';
  if (data.mainPlayers.length === 0) {
    h += '<div style="padding:12px 0;color:var(--text2);font-size:14px">ยังไม่มีผู้เล่น</div>';
  } else {
    for (const p of data.mainPlayers) {
      const active = !!data.pool[p];
      h += `<div class="player-item">
        <button class="pool-toggle ${active ? 'active' : ''}" onclick="togglePool('${jsStr(p)}')"></button>
        <span class="name">${escHtml(p)} <span class="game-count">(${(data.gameCount[p] || 0)} เกม)</span></span>
        <button class="del-btn" onclick="removePlayer('${jsStr(p)}')">✕</button>
      </div>`;
    }
  }
  el.innerHTML = h;
}

// ===== STATS =====
function renderStatsContent() {
  return '<div class="stats-nav">' +
    '<button class="active" onclick="switchStatsTab(this,\'pairs\')">คู่</button>' +
    '<button onclick="switchStatsTab(this,\'opps\')">คู่แข่ง</button>' +
    '<button onclick="switchStatsTab(this,\'games\')">เกม</button>' +
    '<button onclick="switchStatsTab(this,\'history\')">ประวัติ</button>' +
    '</div><div id="statsContent">' + renderStatsPairs() + '</div>';
}

function switchStatsTab(btn, tab) {
  btn.parentElement.querySelectorAll('button').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const el = document.getElementById('statsContent');
  if (!el) return;
  if (tab === 'pairs') el.innerHTML = renderStatsPairs();
  else if (tab === 'opps') el.innerHTML = renderStatsOpps();
  else if (tab === 'games') el.innerHTML = renderStatsGames();
  else el.innerHTML = renderStatsHistory();
}

function renderStatTable(entries, formatter, emptyIcon, emptyText) {
  if (!entries.length)
    return '<div class="empty-state"><div class="icon">' + emptyIcon + '</div><p>' + emptyText + '</p></div>';
  const rows = entries.slice(0, 50)
    .map(([k, v]) => '<tr><td>' + escHtml(formatter(k)) + '</td><td><strong>' + v + '</strong></td></tr>')
    .join('');
  return '<table class="stat-table">' + rows + '</table>';
}

function renderStatsPairs() {
  const entries = Object.entries(data.pairCount).sort((a, b) => b[1] - a[1]);
  return renderStatTable(entries, k => k.replace(/_/g, ' + '), '🤝', 'ยังไม่มีสถิติ');
}

function renderStatsOpps() {
  const entries = Object.entries(data.oppCount).sort((a, b) => b[1] - a[1]);
  return renderStatTable(entries, k => k.replace(/_/g, ' 🆚 '), '⚔️', 'ยังไม่มีสถิติ');
}

function renderStatsGames() {
  const entries = Object.entries(data.gameCount).sort((a, b) => b[1] - a[1]);
  return renderStatTable(entries, k => k, '🏸', 'ยังไม่มีสถิติ');
}

function renderStatsHistory() {
  const h = data.history;
  if (!h.length) return '<div class="empty-state"><div class="icon">📜</div><p>ยังไม่มีประวัติ</p></div>';
  let html = '<div class="history-list">';
  for (let i = h.length - 1; i >= 0; i--) {
    const r = h[i];
    const win = r.winner === 'A' ? r.teamA : r.teamB;
    const lose = r.winner === 'A' ? r.teamB : r.teamA;
    html += '<div class="history-item">' +
      '<span class="time">' + r.time + '</span>' +
      '<span class="court-label">สนาม' + r.court + '</span>' +
      '<span class="teams">' + escHtml(win.join('+')) + ' <span class="trophy">🏆</span> ' + escHtml(lose.join('+')) + '</span>' +
      '</div>';
  }
  html += '</div>';
  return html;
}

// ===== SETTINGS =====
function renderSettingsContent() {
  const s = data.settings;
  const options = [1, 2, 3, 4, 5].map(n =>
    '<option value="' + n + '" ' + (s.gamesPerMatch === n ? 'selected' : '') + '>' + n + ' เกม</option>'
  ).join('');
  return '<div class="settings-card">' +
      '<div class="setting-row">' +
        '<div><div class="setting-label">จำนวนเกม/คู่</div><div class="setting-desc">เล่นกี่เกมแล้วพัก</div></div>' +
        '<select class="setting-input" onchange="data.settings.gamesPerMatch=parseInt(this.value);saveData();render()">' +
          options +
        '</select>' +
      '</div>' +
    '</div>' +
    '<div class="settings-card">' +
      '<div class="section-title">ข้อมูล</div>' +
      '<div class="settings-info">ผู้เล่น: ' + data.mainPlayers.length + ' คน | เกม: ' + data.history.length + ' เกม</div>' +
      '<button class="danger-btn outline" onclick="exportData()">📤 Export</button>' +
      '<div style="margin-top:6px"><input type="file" id="importFile" accept=".json" style="display:none" onchange="importData(event)"><button class="danger-btn outline" onclick="document.getElementById(\'importFile\').click()">📥 Import</button></div>' +
      '<button class="danger-btn danger" onclick="deleteAllData()">🗑️ ลบข้อมูลทั้งหมด</button>' +
    '</div>';
}

function deleteAllData() {
  if (!confirm('ลบข้อมูลทั้งหมด?\nย้อนกลับไม่ได้')) return;
  localStorage.removeItem(SK);
  data = getDef();
  saveData();
  render();
  toast('ลบแล้ว');
}

function exportData() {
  const json = JSON.stringify(data, null, 2);
  const blob = new Blob([json], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'badminton_data.json';
  a.click();
  URL.revokeObjectURL(a.href);
  toast('Export เรียบร้อย');
}

function importData(e) {
  const file = e.target.files[0];
  if (!file) return;
  const r = new FileReader();
  r.onload = ev => {
    try {
      const d = JSON.parse(ev.target.result);
      if (!d.courts || !d.settings) { toast('ไฟล์ไม่ถูกต้อง'); return; }
      data = migrate(d);
      saveData();
      render();
      renderCourtCount();
      toast('Import เรียบร้อย (' + data.history.length + ' เกม)');
    } catch (err) { toast('ไฟล์ไม่ถูกต้อง'); }
  };
  r.readAsText(file);
  e.target.value = '';
}

// ===== INIT =====
function init() {
  render();
  renderCourtCount();
}

init();
</script>
</body>
</html>
